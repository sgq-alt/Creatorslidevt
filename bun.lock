export function getMockedTopics(type: string, title: string, context?: string): string[] {
  const t = (title || '').toLowerCase();
  const ctx = (context || '').toLowerCase();

  switch (type) {
    case 'title':
      return [
        'Apresentação de objetivos estratégicos de qualidade',
        'Alinhamento de expectativas corporativas e metas',
        'Introdução dos responsáveis pelas métricas e processos'
      ];
    case 'results':
      if (t.includes('energia') || ctx.includes('energia')) {
        return [
          'Consumo médio reduzido para 122 MWh/mês',
          'Economia acumulada de R$ 14k em faturamento',
          'Eficiência de captação solar operando em 98.2%'
        ];
      }
      return [
        'Faturamento líquido superou a meta estipulada em 14.2%',
        'Redução significativa nos custos fixos de manutenção',
        'EBITDA demonstrando margem operacional consolidada'
      ];
    case 'indicators':
      return [
        'OTIF alcançou 95.4% de entregas perfeitas',
        'Retrabalho produtivo reduzido a taxas de padrão internacional',
        'Pesquisa de satisfação de clientes atingiu NPS de 92'
      ];
    case 'improvements':
      return [
        'Implementação de rotinas de setup rápido SMED',
        'Padronização das instruções visuais de trabalho',
        'Instalação de sensores IoT nas máquinas gargalo'
      ];
    case 'comparison':
      return [
        'Tempo de ociosidade operacional despencou em 45%',
        'Desperdício de matéria-prima reduzido drasticamente',
        'Retorno sobre o investimento (ROI) projetado para 3 meses'
      ];
    default:
      return [
        'Consolidação de diretrizes operacionais de curto prazo',
        'Cronograma detalhado de execução para as equipes',
        'Agradecimento geral e canais para contato corporativo'
      ];
  }
}

export function getMockedRefinement(type: string, slideTitle: string, text: string): string {
  if (!text) return 'Otimizar fluxos operacionais e monitorar de forma sistemática os canais de eficiência total.';
  const clean = text.trim();
  return `${clean} - Alinhado aos objetivos estratégicos do setor, garantimos consistência de métricas e mitigação proativa de falhas no processo corporativo.`;
}

export function getMockedImageQuery(slideTitle: string): { searchTerm: string; description: string; imageUrl: string } {
  const t = (slideTitle || '').toLowerCase();
  
  if (t.includes('energia') || t.includes('sustentável') || t.includes('solar')) {
    return {
      searchTerm: 'green energy solar panel',
      description: 'Painéis solares ecológicos gerando energia sob luz solar limpa',
      imageUrl: 'https://images.unsplash.com/photo-1508514177221-188b1cf16e9d?w=800&auto=format&fit=crop&q=80'
    };
  }
  if (t.includes('logística') || t.includes('entrega') || t.includes('expedição') || t.includes('caixa')) {
    return {
      searchTerm: 'warehouse logistics robot',
      description: 'Centro de distribuição moderno de alta tecnologia e logística automatizada',
      imageUrl: 'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=800&auto=format&fit=crop&q=80'
    };
  }
  if (t.includes('melhoria') || t.includes('plano') || t.includes('projeto') || t.includes('treinamento')) {
    return {
      searchTerm: 'lean manufacturing continuous improvement',
      description: 'Equipe de engenharia analisando processos de montagem integrada',
      imageUrl: 'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=800&auto=format&fit=crop&q=80'
    };
  }
  if (t.includes('resultado') || t.includes('métrica') || t.includes('kpi') || t.includes('financeiro') || t.includes('gráfico')) {
    return {
      searchTerm: 'business financial chart',
      description: 'Gráfico estatístico dinâmico de crescimento de lucros corporativos',
      imageUrl: 'https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=800&auto=format&fit=crop&q=80'
    };
  }
  
  return {
    searchTerm: 'minimal business workspace',
    description: 'Ambiente executivo moderno, limpo e com iluminação natural produtiva',
    imageUrl: 'https://images.unsplash.com/photo-1531538606174-0f90ff5dce83?w=800&auto=format&fit=crop&q=80'
  };
}
